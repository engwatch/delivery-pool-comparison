<title>Отчёт защищён паролем</title>
<style>
:root{color-scheme:light;--bg:#eef4ff;--card:#ffffff;--text:#10203c;--muted:#5f7396;--line:#d6e2ff;--accent:#2f66ff;}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#f8fbff 0%,#eef4ff 52%,#e7f0ff 100%);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}.card{width:min(460px,100%);background:var(--card);border:1px solid var(--line);border-radius:28px;padding:32px;box-shadow:0 24px 80px rgba(47,102,255,.16)}.icon{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,#2f66ff,#6b8cff);display:grid;place-items:center;color:#fff;font-size:30px;margin-bottom:18px}h1{margin:0 0 10px;font-size:28px;line-height:1.1}p{margin:0 0 18px;color:var(--muted);line-height:1.55}label{display:block;font-size:13px;font-weight:700;margin-bottom:8px}input{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 16px;font-size:16px;outline:none}input:focus{border-color:#9ab6ff;box-shadow:0 0 0 4px rgba(47,102,255,.12)}button{margin-top:14px;width:100%;border:none;border-radius:16px;padding:14px 18px;background:linear-gradient(135deg,#2f66ff,#1f57f0);color:#fff;font-size:16px;font-weight:800;cursor:pointer}.error{min-height:22px;color:#c62828;font-size:14px;margin-top:12px}.hint{margin-top:18px;font-size:13px;color:#7890b4}
</style>
</head>

    <div class="icon">🔒</div>
    <h1>Отчёт защищён паролем</h1>
    <p>Введите пароль, чтобы открыть опубликованную версию отчёта.</p>

    <input id="password" type="password" autocomplete="current-password" placeholder="Введите пароль" />
    <button id="submit" type="button">Открыть</button>

const te=new TextEncoder(), td=new TextDecoder();
async function openReport(){
  const pwd=document.getElementById('password').value;
  const error=document.getElementById('error');
  error.textContent='';
  try {
    const raw=Uint8Array.from(atob(D),c=>c.charCodeAt(0));
    const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
    const keyMaterial=await crypto.subtle.importKey('raw',te.encode(pwd),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    const html=td.decode(plain);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    error.textContent='Неверный пароль';
  }
}
document.getElementById('submit').addEventListener('click',openReport);
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')openReport();});
